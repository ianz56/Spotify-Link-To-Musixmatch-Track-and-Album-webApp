name: Crowdin Sync

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *' # 12 hours
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose which sync to run"
        type: choice
        options:
          - auto
          - upload
          - download
        default: auto

permissions:
  contents: write
  pull-requests: write

jobs:
  upload-sources:
    if: ${{ (github.event_name == 'push' && !contains(github.event.head_commit.message, 'New Crowdin Translations')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'auto' || github.event.inputs.mode == 'upload')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload source strings
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  download-translations:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'auto' || github.event.inputs.mode == 'download')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: 'chore: New Crowdin Translations'
          pull_request_body: 'New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)'
          pull_request_base_branch_name: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}